name: publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Emissary.sln

      - name: Test
        run: dotnet test Emissary.sln -c Release --no-restore

      - name: Build
        run: dotnet build Emissary/DevHound.Emissary.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack Emissary/DevHound.Emissary.csproj -c Release --no-build -o ./artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
